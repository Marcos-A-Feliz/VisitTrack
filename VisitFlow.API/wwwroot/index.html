<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisitFlow</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>🏢 VisitFlow</h1>
    <p>Sistema de Control de Visitas</p>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input id="email" type="email" value="admin@visitflow.com"/>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="password" type="password" value="Admin123!"/>
    </div>
    <button id="btn-login" onclick="login()">Iniciar sesión</button>
    <p class="hint">admin@visitflow.com / Admin123!<br>guardia@visitflow.com / Guardia123!</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sidebar-brand">🏢 VisitFlow</div>
    <nav>
      <a onclick="go('dashboard')">📊 Dashboard</a>
      <a onclick="go('visitas')">📋 Visitas</a>
      <a onclick="go('visitantes')">👥 Visitantes</a>
      <a onclick="go('empleados')">🧑‍💼 Empleados</a>
      <a onclick="go('areas')">🏢 Áreas</a>
    </nav>
    <div class="sidebar-user">
      <span id="user-name">—</span>
      <button onclick="logout()">Salir</button>
    </div>
  </aside>

  <main>
    <div class="topbar"><h2 id="page-title">Dashboard</h2></div>
    <div id="content" class="content"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toasts"></div>

<script src="/app.js"></script>
</body>
</html>
